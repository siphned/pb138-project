services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pb138
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql

  clickstack:
    # ClickStack (HyperDX) all-in-one image
    # Docs: https://clickhouse.com/docs/use-cases/observability/clickstack/deployment/all-in-one
    image: clickhouse/clickstack-all-in-one:latest
    ports:
      - '8080:8080'   # ClickStack UI
      - '4317:4317'   # OpenTelemetry gRPC collector
      - '4318:4318'   # OpenTelemetry HTTP collector
    volumes:
      - clickstack_db:/data/db
      - clickstack_ch_data:/var/lib/clickhouse
      - clickstack_ch_logs:/var/log/clickhouse-server

volumes:
  pgdata:
  clickstack_db:
  clickstack_ch_data:
  clickstack_ch_logs:
