name: Jira CI Status

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

env:
  JIRA_BASE_URL: https://api.atlassian.com/ex/jira/c6f2e588-c214-4698-b7bd-5a5be28a9e06/rest/api/3
  JIRA_EMAIL: 536230@muni.cz

jobs:
  jira-status:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira issue from PR title
        id: extract
        run: |
          # Get PR title from the workflow run
          PR_TITLE="${{ github.event.workflow_run.pull_requests[0].title }}"

          if [ -z "$PR_TITLE" ]; then
            echo "No PR found in workflow run, skipping status update"
            exit 0
          fi

          # Extract WINE-XX pattern
          if [[ $PR_TITLE =~ \[?(WINE-[0-9]+)\]? ]]; then
            ISSUE="${BASH_REMATCH[1]}"
            echo "issue=$ISSUE" >> $GITHUB_OUTPUT
            echo "Found Jira issue: $ISSUE"
          else
            echo "No Jira issue found in PR title: $PR_TITLE"
            exit 0
          fi

      - name: Post CI Status to Jira (Success)
        if: github.event.workflow_run.conclusion == 'success' && steps.extract.outputs.issue
        run: |
          set -e
          ISSUE="${{ steps.extract.outputs.issue }}"
          AUTH=$(echo -n "$JIRA_EMAIL:${{ secrets.JIRA_TOKEN }}" | base64)
          WORKFLOW_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"

          PAYLOAD=$(jq -n \
            --arg workflowUrl "$WORKFLOW_URL" \
            '{
              body: {
                version: 1,
                type: "doc",
                content: [
                  {
                    type: "paragraph",
                    content: [{
                      type: "text",
                      text: "✅ CI Pipeline passed"
                    }]
                  },
                  {
                    type: "paragraph",
                    content: [{
                      type: "text",
                      text: "View workflow run",
                      marks: [{
                        type: "link",
                        attrs: { href: $workflowUrl }
                      }]
                    }]
                  }
                ]
              }
            }')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$JIRA_BASE_URL/issue/$ISSUE/comments")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Failed to post success comment to $ISSUE (HTTP $HTTP_CODE)"
            echo "$RESPONSE" | head -n-1
            exit 1
          fi
          echo "✅ Posted success comment to $ISSUE"

      - name: Post CI Status to Jira (Failure)
        if: github.event.workflow_run.conclusion == 'failure' && steps.extract.outputs.issue
        run: |
          set -e
          ISSUE="${{ steps.extract.outputs.issue }}"
          AUTH=$(echo -n "$JIRA_EMAIL:${{ secrets.JIRA_TOKEN }}" | base64)
          WORKFLOW_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"

          PAYLOAD=$(jq -n \
            --arg workflowUrl "$WORKFLOW_URL" \
            '{
              body: {
                version: 1,
                type: "doc",
                content: [
                  {
                    type: "paragraph",
                    content: [{
                      type: "text",
                      text: "❌ CI Pipeline failed"
                    }]
                  },
                  {
                    type: "paragraph",
                    content: [{
                      type: "text",
                      text: "View workflow run",
                      marks: [{
                        type: "link",
                        attrs: { href: $workflowUrl }
                      }]
                    }]
                  },
                  {
                    type: "paragraph",
                    content: [{
                      type: "text",
                      text: "Please review the pipeline logs and fix any issues before requesting review."
                    }]
                  }
                ]
              }
            }')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$JIRA_BASE_URL/issue/$ISSUE/comments")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Failed to post failure comment to $ISSUE (HTTP $HTTP_CODE)"
            echo "$RESPONSE" | head -n-1
            exit 1
          fi
          echo "✅ Posted failure comment to $ISSUE"
