name: Jira CI Status

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  jira-status:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_commit.id }}

      - name: Extract Jira issue from PR title
        id: extract
        run: |
          # Get PR title from the workflow run
          PR_TITLE="${{ github.event.workflow_run.pull_requests[0].title }}"

          if [ -z "$PR_TITLE" ]; then
            echo "No PR found in workflow run, skipping status update"
            exit 0
          fi

          # Extract WINE-XX pattern
          if [[ $PR_TITLE =~ \[?(WINE-[0-9]+)\]? ]]; then
            ISSUE="${BASH_REMATCH[1]}"
            echo "issue=$ISSUE" >> $GITHUB_OUTPUT
            echo "Found Jira issue: $ISSUE"
          else
            echo "No Jira issue found in PR title: $PR_TITLE"
            exit 0
          fi

      - name: Post CI Status to Jira (Success)
        if: github.event.workflow_run.conclusion == 'success' && steps.extract.outputs.issue
        uses: atlassian/gajira-comment@master
        with:
          issue: ${{ steps.extract.outputs.issue }}
          comment: |
            ✅ CI Pipeline passed

            [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }})
        env:
          JIRA_BASE_URL: https://pb138winery.atlassian.net
          JIRA_USER_EMAIL: 536230@mail.muni.cz
          JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN }}

      - name: Post CI Status to Jira (Failure)
        if: github.event.workflow_run.conclusion == 'failure' && steps.extract.outputs.issue
        uses: atlassian/gajira-comment@master
        with:
          issue: ${{ steps.extract.outputs.issue }}
          comment: |
            ❌ CI Pipeline failed

            [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }})

            Please review the pipeline logs and fix any issues before requesting review.
        env:
          JIRA_BASE_URL: https://pb138winery.atlassian.net
          JIRA_USER_EMAIL: 536230@mail.muni.cz
          JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN }}
