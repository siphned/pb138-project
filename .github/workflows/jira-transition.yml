name: Jira Transition

on:
  pull_request:
    types: [opened, closed, reopened]

jobs:
  transition:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira issue from PR title
        id: extract
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          # Extract WINE-XX pattern from PR title
          if [[ $TITLE =~ \[?(WINE-[0-9]+)\]? ]]; then
            ISSUE="${BASH_REMATCH[1]}"
            echo "issue=$ISSUE" >> $GITHUB_OUTPUT
            echo "Found Jira issue: $ISSUE"
          else
            echo "No Jira issue found in PR title: $TITLE"
            exit 0
          fi

      - name: Transition to "Ready for Review" (PR opened)
        if: github.event.action == 'opened' && steps.extract.outputs.issue
        run: |
          ISSUE="${{ steps.extract.outputs.issue }}"
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.JIRA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"transition": {"id": "10078"}}' \
            https://api.atlassian.com/ex/jira/c6f2e588-c214-4698-b7bd-5a5be28a9e06/rest/api/3/issues/$ISSUE/transitions
          echo "✅ Transitioned $ISSUE to Ready for Review"

      - name: Transition to "Done" (PR merged)
        if: github.event.action == 'closed' && github.event.pull_request.merged == true && steps.extract.outputs.issue
        run: |
          ISSUE="${{ steps.extract.outputs.issue }}"
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.JIRA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"transition": {"id": "10042"}}' \
            https://api.atlassian.com/ex/jira/c6f2e588-c214-4698-b7bd-5a5be28a9e06/rest/api/3/issues/$ISSUE/transitions
          echo "✅ Transitioned $ISSUE to Done"

      - name: Transition back to "In Progress" (PR closed without merge)
        if: github.event.action == 'closed' && github.event.pull_request.merged == false && steps.extract.outputs.issue
        run: |
          ISSUE="${{ steps.extract.outputs.issue }}"
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.JIRA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"transition": {"id": "10041"}}' \
            https://api.atlassian.com/ex/jira/c6f2e588-c214-4698-b7bd-5a5be28a9e06/rest/api/3/issues/$ISSUE/transitions
          echo "✅ Transitioned $ISSUE to In Progress"

      - name: Add PR link comment to Jira (opened)
        if: github.event.action == 'opened' && steps.extract.outputs.issue
        run: |
          ISSUE="${{ steps.extract.outputs.issue }}"
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.JIRA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "body": {
                "version": 1,
                "type": "doc",
                "content": [
                  {
                    "type": "paragraph",
                    "content": [
                      {
                        "type": "text",
                        "text": "🔗 PR linked: "
                      },
                      {
                        "type": "link",
                        "attrs": {
                          "href": "${{ github.event.pull_request.html_url }}"
                        },
                        "content": [
                          {
                            "type": "text",
                            "text": "${{ github.event.pull_request.title }}"
                          }
                        ]
                      },
                      {
                        "type": "text",
                        "text": " | Branch: ${{ github.event.pull_request.head.ref }}"
                      }
                    ]
                  }
                ]
              }
            }' \
            https://api.atlassian.com/ex/jira/c6f2e588-c214-4698-b7bd-5a5be28a9e06/rest/api/3/issues/$ISSUE/comments
          echo "✅ Added PR comment to $ISSUE"
