name: Jira Transition

on:
  pull_request:
    types: [opened, closed, reopened]

env:
  JIRA_BASE_URL: https://api.atlassian.com/ex/jira/c6f2e588-c214-4698-b7bd-5a5be28a9e06/rest/api/3
  JIRA_EMAIL: 536230@muni.cz

jobs:
  transition:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira issue from PR title
        id: extract
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          # Extract WINE-XX pattern from PR title
          if [[ $TITLE =~ \[?(WINE-[0-9]+)\]? ]]; then
            ISSUE="${BASH_REMATCH[1]}"
            echo "issue=$ISSUE" >> $GITHUB_OUTPUT
            echo "Found Jira issue: $ISSUE"
          else
            echo "No Jira issue found in PR title: $TITLE"
            exit 0
          fi

      - name: Transition to "Ready for Review" (PR opened)
        if: github.event.action == 'opened' && steps.extract.outputs.issue
        run: |
          set -e
          ISSUE="${{ steps.extract.outputs.issue }}"
          AUTH=$(echo -n "$JIRA_EMAIL:${{ secrets.JIRA_TOKEN }}" | base64)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"transition": {"id": "10078"}}' \
            "$JIRA_BASE_URL/issue/$ISSUE/transitions")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" != "204" ]; then
            echo "❌ Failed to transition $ISSUE (HTTP $HTTP_CODE)"
            echo "$RESPONSE" | head -n-1
            exit 1
          fi
          echo "✅ Transitioned $ISSUE to Ready for Review"

      - name: Transition to "Done" (PR merged)
        if: github.event.action == 'closed' && github.event.pull_request.merged == true && steps.extract.outputs.issue
        run: |
          set -e
          ISSUE="${{ steps.extract.outputs.issue }}"
          AUTH=$(echo -n "$JIRA_EMAIL:${{ secrets.JIRA_TOKEN }}" | base64)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"transition": {"id": "10042"}}' \
            "$JIRA_BASE_URL/issue/$ISSUE/transitions")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" != "204" ]; then
            echo "❌ Failed to transition $ISSUE (HTTP $HTTP_CODE)"
            echo "$RESPONSE" | head -n-1
            exit 1
          fi
          echo "✅ Transitioned $ISSUE to Done"

      - name: Transition back to "In Progress" (PR closed without merge)
        if: github.event.action == 'closed' && github.event.pull_request.merged == false && steps.extract.outputs.issue
        run: |
          set -e
          ISSUE="${{ steps.extract.outputs.issue }}"
          AUTH=$(echo -n "$JIRA_EMAIL:${{ secrets.JIRA_TOKEN }}" | base64)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"transition": {"id": "10041"}}' \
            "$JIRA_BASE_URL/issue/$ISSUE/transitions")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" != "204" ]; then
            echo "❌ Failed to transition $ISSUE (HTTP $HTTP_CODE)"
            echo "$RESPONSE" | head -n-1
            exit 1
          fi
          echo "✅ Transitioned $ISSUE to In Progress"

      - name: Add PR link comment to Jira (opened)
        if: github.event.action == 'opened' && steps.extract.outputs.issue
        run: |
          set -e
          ISSUE="${{ steps.extract.outputs.issue }}"
          AUTH=$(echo -n "$JIRA_EMAIL:${{ secrets.JIRA_TOKEN }}" | base64)
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"

          PAYLOAD=$(jq -n \
            --arg prTitle "$PR_TITLE" \
            --arg prUrl "$PR_URL" \
            --arg prBranch "$PR_BRANCH" \
            '{
              body: {
                version: 1,
                type: "doc",
                content: [
                  {
                    type: "paragraph",
                    content: [
                      {
                        type: "text",
                        text: ("🔗 PR linked: " + $prTitle + " | Branch: " + $prBranch),
                        marks: [{
                          type: "link",
                          attrs: { href: $prUrl }
                        }]
                      }
                    ]
                  }
                ]
              }
            }')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$JIRA_BASE_URL/issue/$ISSUE/comments")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Failed to add comment to $ISSUE (HTTP $HTTP_CODE)"
            echo "$RESPONSE" | head -n-1
            exit 1
          fi
          echo "✅ Added PR comment to $ISSUE"
