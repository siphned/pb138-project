name: Jira Transition

on:
  pull_request:
    types: [opened, closed, reopened]

jobs:
  transition:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira issue from PR title
        id: extract
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          # Extract WINE-XX pattern from PR title
          if [[ $TITLE =~ \[?(WINE-[0-9]+)\]? ]]; then
            ISSUE="${BASH_REMATCH[1]}"
            echo "issue=$ISSUE" >> $GITHUB_OUTPUT
            echo "Found Jira issue: $ISSUE"
          else
            echo "No Jira issue found in PR title: $TITLE"
            exit 1
          fi

      - name: Transition to "Ready for Review" (PR opened)
        if: github.event.action == 'opened'
        uses: atlassian/gajira-transition@master
        with:
          issue: ${{ steps.extract.outputs.issue }}
          transition: "Ready for Review"
        env:
          JIRA_BASE_URL: https://pb138winery.atlassian.net
          JIRA_USER_EMAIL: 536230@mail.muni.cz
          JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN }}

      - name: Transition to "Done" (PR merged)
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        uses: atlassian/gajira-transition@master
        with:
          issue: ${{ steps.extract.outputs.issue }}
          transition: "Done"
        env:
          JIRA_BASE_URL: https://pb138winery.atlassian.net
          JIRA_USER_EMAIL: 536230@mail.muni.cz
          JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN }}

      - name: Transition back to "In Progress" (PR closed without merge)
        if: github.event.action == 'closed' && github.event.pull_request.merged == false
        uses: atlassian/gajira-transition@master
        with:
          issue: ${{ steps.extract.outputs.issue }}
          transition: "In Progress"
        env:
          JIRA_BASE_URL: https://pb138winery.atlassian.net
          JIRA_USER_EMAIL: 536230@mail.muni.cz
          JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN }}

      - name: Add PR link comment to Jira (opened)
        if: github.event.action == 'opened'
        uses: atlassian/gajira-comment@master
        with:
          issue: ${{ steps.extract.outputs.issue }}
          comment: |
            🔗 PR linked: [${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})
            Branch: `${{ github.event.pull_request.head.ref }}`
        env:
          JIRA_BASE_URL: https://pb138winery.atlassian.net
          JIRA_USER_EMAIL: 536230@mail.muni.cz
          JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN }}
