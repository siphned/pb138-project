name: Seed Production Database

on:
  workflow_dispatch: {}

jobs:
  seed:
    name: Seed Demo Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run demo seed
        run: |
          cd apps/server
          bun run src/db/seed.demo.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TEST_USER_CLERK_ID: ${{ secrets.TEST_USER_CLERK_ID }}
