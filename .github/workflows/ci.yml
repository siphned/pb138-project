# CI Workflow - Optimized for GitHub Actions free tier
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [dev, main]
  workflow_dispatch: {}

# Concurrency: cancel in-progress runs if a new one is triggered
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun registry (tarballs only)
        uses: actions/cache@v4
        with:
          path: .bun-cache
          key: ${{ runner.os }}-bun-registry-${{ hashFiles('**/bun.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-bun-registry-
      - name: Install dependencies
        run: BUN_INSTALL_CACHE_DIR=.bun-cache bun install --frozen-lockfile --backend=copyfile

  generate:
    needs: install
    runs-on: self-hosted
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:15432/winemarket
      FRONTEND_URL: http://localhost:5173
      CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY || 'ci_placeholder' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'ci_placeholder' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Restore bun registry cache
        uses: actions/cache@v4
        with:
          path: .bun-cache
          key: ${{ runner.os }}-bun-registry-${{ hashFiles('**/bun.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-bun-registry-
      - name: Install dependencies
        run: BUN_INSTALL_CACHE_DIR=.bun-cache bun install --frozen-lockfile --backend=copyfile
      - name: Start postgres
        run: |
          docker rm -f postgres-winery-ci 2>/dev/null || true
          docker run -d --name postgres-winery-ci \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=winemarket \
            -p 15432:5432 \
            postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec postgres-winery-ci pg_isready -U postgres && break || sleep 2
          done
      - name: Migrate Database
        run: cd apps/server && bun drizzle-kit push || true
      - name: Generate OpenAPI spec
        run: cd apps/server && bun run scripts/export-spec.ts
      - name: Generate Kubb client
        run: cd apps/web && bunx kubb
      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/
      - name: Stop postgres
        if: always()
        run: docker rm -f postgres-winery-ci 2>/dev/null || true

  lint:
    needs: install
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Restore bun registry cache
        uses: actions/cache@v4
        with:
          path: .bun-cache
          key: ${{ runner.os }}-bun-registry-${{ hashFiles('**/bun.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-bun-registry-
      - name: Install dependencies
        run: BUN_INSTALL_CACHE_DIR=.bun-cache bun install --frozen-lockfile --backend=copyfile
      - name: Remove runner global biome config
        run: rm -f "$HOME/.config/biome/biome.json"
      - name: Run biome lint
        run: bunx biome lint --config-path ./biome.json .

  typecheck:
    needs: generate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Restore bun registry cache
        uses: actions/cache@v4
        with:
          path: .bun-cache
          key: ${{ runner.os }}-bun-registry-${{ hashFiles('**/bun.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-bun-registry-
      - name: Install dependencies
        run: BUN_INSTALL_CACHE_DIR=.bun-cache bun install --frozen-lockfile --backend=copyfile
      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/
      - name: Type check
        run: bun run check-types

  security-fast:
    needs: install
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Restore bun registry cache
        uses: actions/cache@v4
        with:
          path: .bun-cache
          key: ${{ runner.os }}-bun-registry-${{ hashFiles('**/bun.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-bun-registry-
      - name: Install dependencies
        run: BUN_INSTALL_CACHE_DIR=.bun-cache bun install --frozen-lockfile --backend=copyfile
      - name: Run bun audit
        run: bun audit --json || true

  build:
    needs: [lint, typecheck, generate]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Restore bun registry cache
        uses: actions/cache@v4
        with:
          path: .bun-cache
          key: ${{ runner.os }}-bun-registry-${{ hashFiles('**/bun.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-bun-registry-
      - name: Install dependencies
        run: BUN_INSTALL_CACHE_DIR=.bun-cache bun install --frozen-lockfile --backend=copyfile
      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/
      - name: Build
        run: bun run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/server/dist/
            apps/web/dist/

  test:
    needs: [install, generate]
    runs-on: self-hosted
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:15432/winemarket
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Restore bun registry cache
        uses: actions/cache@v4
        with:
          path: .bun-cache
          key: ${{ runner.os }}-bun-registry-${{ hashFiles('**/bun.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-bun-registry-
      - name: Install dependencies
        run: BUN_INSTALL_CACHE_DIR=.bun-cache bun install --frozen-lockfile --backend=copyfile
      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/
      - name: Start postgres
        run: |
          docker rm -f postgres-winery-ci 2>/dev/null || true
          docker run -d --name postgres-winery-ci \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=winemarket \
            -p 15432:5432 \
            postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec postgres-winery-ci pg_isready -U postgres && break || sleep 2
          done
      - name: Migrate Database
        run: cd apps/server && bun drizzle-kit push || true
      - name: Run unit tests
        run: bun run test
      - name: Upload junit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: apps/*/test-results.xml
      - name: Stop postgres
        if: always()
        run: docker rm -f postgres-winery-ci 2>/dev/null || true

  compliance:
    needs: install
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  # E2E tests — required CI gate. Failure blocks PR merge.
  e2e:
    needs: [install, generate]
    runs-on: self-hosted
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:15432/winemarket
      FRONTEND_URL: http://localhost:5173
      CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY || 'ci_placeholder' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'ci_placeholder' }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'ci_placeholder' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Restore bun registry cache
        uses: actions/cache@v4
        with:
          path: .bun-cache
          key: ${{ runner.os }}-bun-registry-${{ hashFiles('**/bun.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-bun-registry-
      - name: Install dependencies
        run: BUN_INSTALL_CACHE_DIR=.bun-cache bun install --frozen-lockfile --backend=copyfile
      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/
      - name: Install Playwright
        run: bunx playwright install --with-deps chromium
      - name: Start postgres
        run: |
          docker rm -f postgres-winery-ci 2>/dev/null || true
          docker run -d --name postgres-winery-ci \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=winemarket \
            -p 15432:5432 \
            postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec postgres-winery-ci pg_isready -U postgres && break || sleep 2
          done
      - name: Migrate Database
        run: cd apps/server && bun drizzle-kit push || true
      - name: Remove .env.local to prevent bun from overriding CI env
        run: rm -f apps/server/.env.local
      - name: Run E2E tests
        run: cd apps/web && bunx playwright test --reporter=html
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: apps/web/playwright-report/
      - name: Stop postgres
        if: always()
        run: docker rm -f postgres-winery-ci 2>/dev/null || true
# trigger
