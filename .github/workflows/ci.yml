# CI Workflow - Optimized for GitHub Actions free tier
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [dev, main]
  workflow_dispatch: {}

# Concurrency: cancel in-progress runs if a new one is triggered
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    runs-on: self-hosted
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Cache bun and node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}-v3
      - name: Install dependencies
        run: bun install --frozen-lockfile

  generate:
    needs: install
    runs-on: self-hosted
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/winemarket
      FRONTEND_URL: http://localhost:5173
      CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY || 'ci_placeholder' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'ci_placeholder' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}-v3
          fail-on-cache-miss: false
      - name: Migrate Database
        run: |
          cd apps/server
          bun install --frozen-lockfile
          bun drizzle-kit push
      - name: Start backend server
        run: bun run apps/server/src/index.ts &
      - name: Wait for server to be ready
        run: until curl -sf http://localhost:3000/swagger/json > /dev/null; do sleep 1; done
      - name: Generate Kubb client
        run: bun run generate
      - name: Stop backend server
        if: always()
        run: kill $(lsof -t -i:3000) 2>/dev/null || true
      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/

  lint:
    needs: install
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}-v3
          fail-on-cache-miss: false
      - name: Run biome lint
        run: bun run lint

  typecheck:
    needs: generate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}-v3
          fail-on-cache-miss: false
      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/
      - name: Type check
        run: bun run check-types

  security-fast:
    needs: install
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}-v3
          fail-on-cache-miss: false
      - name: Run bun audit
        run: bun audit --json || true
      - name: Install deps for license check
        run: bun install --frozen-lockfile
      - name: Check licenses
        run: bun x license-checker --onlyAllow "MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;WTFPL;Zlib;OFL-1.1"

  build:
    needs: [lint, typecheck, generate]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}-v3
          fail-on-cache-miss: false
      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/
      - name: Build
        run: bun run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/server/dist/
            apps/web/dist/

  test:
    needs: [install, generate]
    runs-on: self-hosted
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/winemarket
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}-v3
          fail-on-cache-miss: false
      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/
      - name: Migrate Database
        run: |
          cd apps/server
          bun install --frozen-lockfile
          bun drizzle-kit push
      - name: Run unit tests
        run: bun run test
      - name: Upload junit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: apps/*/test-results.xml

  compliance:
    needs: install
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  # E2E tests — required CI gate. Failure blocks PR merge.
  e2e:
    needs: [install, generate]
    runs-on: self-hosted
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/winemarket
      FRONTEND_URL: http://localhost:5173
      CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY || 'ci_placeholder' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'ci_placeholder' }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'ci_placeholder' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}-v3
          fail-on-cache-miss: false
      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/
      - name: Install Playwright
        run: bunx playwright install --with-deps chromium
      - name: Migrate Database
        run: cd apps/server && bun install --frozen-lockfile && bun drizzle-kit push
      - name: Run E2E tests
        run: cd apps/web && bunx playwright test --reporter=html
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: apps/web/playwright-report/
