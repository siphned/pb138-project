# CI Workflow - Optimized for GitHub Actions free tier
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [dev, main]
  workflow_dispatch: {}

# Concurrency: cancel in-progress runs if a new one is triggered
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    runs-on: self-hosted
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Cache bun and node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
      - name: Install dependencies
        run: bun install --frozen-lockfile

  generate:
    needs: install
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: winemarket
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/winemarket
      FRONTEND_URL: http://localhost:5173
      # Clerk keys only needed when auth is actually called (not during spec gen)
      CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY || 'ci_placeholder' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'ci_placeholder' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          fail-on-cache-miss: true
      - name: Migrate Database
        run: |
          cd apps/server
          bunx drizzle-kit push
      - name: Start backend server
        run: bun run apps/server/src/index.ts &
      - name: Wait for server to be ready
        run: until curl -sf http://localhost:3000/swagger/json > /dev/null; do sleep 1; done
      - name: Generate Kubb client
        run: bun run generate
      - name: Stop backend server
        if: always()
        run: kill $(lsof -t -i:3000) 2>/dev/null || true
      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/

  lint:
    needs: install
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          fail-on-cache-miss: true
      - name: Run biome lint
        run: bun run lint

  typecheck:
    needs: generate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          fail-on-cache-miss: true
      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/
      - name: Type check
        run: bun run check-types

  security-fast:
    needs: install
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          fail-on-cache-miss: true
      - name: Run bun audit
        run: bun audit --json || true
      - name: Install license-checker
        run: bun add -g license-checker
      - name: Check licenses
        run: license-checker --onlyAllow "MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;WTFPL;Zlib;OFL-1.1"

  build:
    needs: [lint, typecheck, generate]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          fail-on-cache-miss: true
      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/
      - name: Build
        run: bun run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/server/dist/
            apps/web/dist/

  test:
    needs: [install, generate]
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: winemarket
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/winemarket
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .bun-cache
            node_modules
            apps/server/node_modules
            apps/web/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          fail-on-cache-miss: true
      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: apps/web/src/generated/
      - name: Migrate Database
        run: |
          cd apps/server
          bunx drizzle-kit push
      - name: Run unit tests
        run: bun run test
      - name: Upload junit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: apps/*/test-results.xml

  compliance:
    needs: install
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: high
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
