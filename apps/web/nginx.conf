server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /uploads/ {
        proxy_pass http://server:3000;
    }

    location /profile {
        proxy_pass http://server:3000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
