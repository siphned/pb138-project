services:
  db:
    image: postgres:18.1-alpine
    container_name: winemarket-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: winemarket
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: applies Drizzle migrations, then exits 0.
  migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: winemarket-server
    container_name: winemarket-migrate
    restart: "no"
    command: ["bun", "run", "--cwd", "apps/server", "db:migrate"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/winemarket
    depends_on:
      db:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: winemarket-server
    container_name: winemarket-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@db:5432/winemarket
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_JWT_KEY: ${CLERK_JWT_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL:-onboarding@resend.dev}

    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: winemarket-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

  # On-demand demo seeding: `docker compose run --rm seed`
  seed:
    image: winemarket-server
    profiles: ["seed"]
    container_name: winemarket-seed
    command: ["bun", "run", "--cwd", "apps/server", "db:seed:demo"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/winemarket
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      TEST_USER_CLERK_ID: ${TEST_USER_CLERK_ID:-user_test_user_placeholder}
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:8.2
    profiles: ["tools"]
    container_name: winemarket-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@winemarket.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
